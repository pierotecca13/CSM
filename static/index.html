<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CSM Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1F3C; --navy2:#1A3461; --blue:#2563EB; --blue-light:#3B82F6;
  --teal:#0891B2; --green:#059669; --green-l:#10B981;
  --amber:#D97706; --amber-l:#F59E0B;
  --red:#DC2626; --red-l:#EF4444;
  --purple:#7C3AED;
  --slate:#6B7280; --slate-l:#9CA3AF;
  --bg:#F0F4FB; --surface:#FFFFFF;
  --border:#E2E8F0; --border2:#CBD5E1;
  --shadow:0 1px 4px rgba(13,31,60,.06),0 4px 16px rgba(13,31,60,.04);
  --shadow-md:0 4px 12px rgba(13,31,60,.10),0 12px 32px rgba(13,31,60,.06);
  --shadow-lg:0 8px 32px rgba(13,31,60,.16);
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px;
  --font-sans:'Figtree',sans-serif;
  --font-head:'Syne',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--navy);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes countUp{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.hidden{display:none!important}
.page{padding:20px 24px;animation:fadeUp .35s ease;max-width:1600px;margin:0 auto}

/* ═══ UTILITY ═══════════════════════════════════════ */
.flex{display:flex;align-items:center}
.gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}.gap-16{gap:16px}
.fw-600{font-weight:600}.fw-700{font-weight:700}
.fs-10{font-size:10px}.fs-11{font-size:11px}.fs-12{font-size:12px}.fs-13{font-size:13px}
.mono{font-family:var(--font-mono)}
.text-slate{color:var(--slate)}.text-navy{color:var(--navy)}
.upper{text-transform:uppercase;letter-spacing:.06em}

/* ═══ LOGIN ══════════════════════════════════════════ */
#login-page{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,var(--navy) 0%,#0f2952 50%,#1a3a6b 100%);
  position:relative;overflow:hidden
}
#login-page::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(37,99,235,.18) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 80% 20%,rgba(8,145,178,.15) 0%,transparent 60%);
}
.login-box{
  background:rgba(255,255,255,.97);backdrop-filter:blur(20px);
  border-radius:24px;padding:40px 44px;width:100%;max-width:500px;
  box-shadow:0 32px 80px rgba(0,0,0,.35);animation:fadeUp .5s ease;
  position:relative;z-index:1;border:1px solid rgba(255,255,255,.8)
}
.login-brand{text-align:center;margin-bottom:32px}
.login-icon{
  width:60px;height:60px;background:linear-gradient(135deg,var(--navy),var(--blue));
  border-radius:18px;display:inline-flex;align-items:center;justify-content:center;
  font-size:28px;margin-bottom:14px;box-shadow:0 8px 24px rgba(13,31,60,.25)
}
.login-brand h1{font-family:var(--font-head);font-size:26px;color:var(--navy);letter-spacing:-.02em}
.login-brand p{font-size:13px;color:var(--slate);margin-top:3px}
.tabs{display:flex;background:#F1F5F9;border-radius:10px;padding:3px;margin-bottom:24px;gap:2px}
.tab{flex:1;padding:8px;text-align:center;border:none;background:none;cursor:pointer;border-radius:7px;font-size:12px;font-weight:600;color:var(--slate);font-family:var(--font-sans);transition:all .2s}
.tab.active{background:var(--surface);color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tab-panel{display:none}.tab-panel.active{display:block}
label{font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block}
input[type=text],input[type=email],input[type=password],input[type=number],select{
  width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);
  font-size:13px;color:var(--navy);outline:none;background:#F8FAFC;
  font-family:var(--font-sans);transition:border-color .2s,box-shadow .2s,background .2s
}
input:focus,select:focus{border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-row{margin-bottom:14px}
.row2{display:flex;gap:10px}.row2 .form-row{flex:1}
.btn{padding:11px 20px;border-radius:10px;border:none;font-weight:700;font-size:13px;cursor:pointer;width:100%;transition:all .2s;font-family:var(--font-sans);letter-spacing:.01em}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(13,31,60,.25)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:#1D4ED8;transform:translateY(-1px)}
.btn-sm{padding:6px 14px;border-radius:8px;border:1.5px solid;background:transparent;font-weight:600;font-size:11px;cursor:pointer;font-family:var(--font-sans);transition:all .2s;white-space:nowrap}
.btn-outline{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-weight:600;font-size:12px;cursor:pointer;font-family:var(--font-sans);color:var(--navy);transition:all .2s}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);background:#EFF6FF}
.btn-export{padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-weight:600;font-size:11px;cursor:pointer;font-family:var(--font-sans);color:var(--slate);transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-export:hover{border-color:var(--blue);color:var(--blue);background:#EFF6FF}
.alert{border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.alert::before{flex-shrink:0;font-size:14px;line-height:1.5}
.alert-ok{background:#ECFDF5;border:1.5px solid #6EE7B7;color:#065F46}.alert-ok::before{content:"✓"}
.alert-err{background:#FEF2F2;border:1.5px solid #FECACA;color:var(--red)}.alert-err::before{content:"✗"}
.alert-warn{background:#FFFBEB;border:1.5px solid #FDE68A;color:#92400E}.alert-warn::before{content:"⚠"}
.hint{font-size:10px;color:var(--slate-l);margin-top:4px;line-height:1.4}

/* ═══ TOPBAR ═════════════════════════════════════════ */
.topbar{
  background:linear-gradient(135deg,var(--navy) 0%,#0f2952 100%);
  border-radius:20px;padding:16px 24px;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--shadow-md);position:relative;overflow:hidden
}
.topbar::after{
  content:'';position:absolute;top:0;right:0;width:300px;height:100%;
  background:radial-gradient(ellipse 60% 80% at 100% 50%,rgba(37,99,235,.2) 0%,transparent 70%);
  pointer-events:none
}
.topbar-brand h1{font-family:var(--font-head);font-size:18px;font-weight:700;color:#fff;letter-spacing:-.01em}
.topbar-brand p{font-size:11px;color:#94A3B8;margin-top:1px}
.topbar-stats{display:flex;gap:24px;align-items:center}
.tstat{text-align:center}
.tstat-val{font-size:20px;font-weight:700;font-family:var(--font-mono);line-height:1;animation:countUp .4s ease}
.tstat-lbl{font-size:9px;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.topbar-divider{width:1px;height:32px;background:rgba(255,255,255,.1)}
.topbar-actions{display:flex;gap:6px;margin-left:16px}

/* ═══ FILTERS ════════════════════════════════════════ */
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--slate);transition:all .2s;font-family:var(--font-sans)}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 8px rgba(13,31,60,.2)}
.filter-btn:not(.active):hover{border-color:var(--blue);color:var(--blue);background:#EFF6FF}
.filters-right{margin-left:auto;display:flex;gap:6px;align-items:center}

/* ═══ CARDS ══════════════════════════════════════════ */
.card{background:var(--surface);border-radius:var(--r-lg);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow-md)}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.card-title{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
.card-sub{font-size:11px;color:var(--slate);margin-top:2px;font-weight:500}
.card-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#EFF6FF;color:var(--blue)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px}

/* ═══ KPI CARDS ══════════════════════════════════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{
  background:var(--surface);border-radius:var(--r-md);padding:16px;
  border:1px solid var(--border);box-shadow:var(--shadow);
  position:relative;overflow:hidden;transition:all .2s
}
.kpi:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:4px 0 0 4px}
.kpi.green::before{background:var(--green)}
.kpi.blue::before{background:var(--blue)}
.kpi.amber::before{background:var(--amber)}
.kpi.red::before{background:var(--red)}
.kpi.purple::before{background:var(--purple)}
.kpi.teal::before{background:var(--teal)}
.kpi.navy::before{background:var(--navy)}
.kpi-icon{font-size:18px;margin-bottom:8px}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:700;font-family:var(--font-mono);line-height:1;animation:countUp .4s ease}
.kpi-sub{font-size:10px;color:var(--slate);margin-top:4px;line-height:1.4}
.kpi-delta{font-size:11px;font-weight:600;margin-top:5px;display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px}
.kpi-delta.up{background:#FEF2F2;color:var(--red)}
.kpi-delta.down{background:#ECFDF5;color:var(--green)}
.kpi-delta.neutral{background:#F1F5F9;color:var(--slate)}

/* ═══ TABLE ══════════════════════════════════════════ */
.table-wrap{overflow-x:auto;border-radius:var(--r-md);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  padding:10px 14px;background:var(--navy);color:#fff;font-weight:600;
  text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;
  white-space:nowrap
}
thead th:first-child{border-radius:0}
tbody tr.data-row{cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
tbody tr.data-row:last-child{border-bottom:none}
tbody tr.data-row:hover{background:#F0F7FF}
tbody td{padding:11px 14px;font-size:12px;vertical-align:middle}

/* ═══ HEALTH / SCORE ════════════════════════════════ */
.hbar-wrap{display:flex;align-items:center;gap:8px}
.hbar{height:4px;width:44px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}
.hbar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.hbadge{font-size:9px;border-radius:20px;padding:2px 8px;font-weight:700;white-space:nowrap}
.score-circle{width:44px;height:44px;position:relative;flex-shrink:0}
.score-circle svg{transform:rotate(-90deg)}
.score-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--font-mono)}

/* ═══ SATISFACTION PANEL ═════════════════════════════ */
.sat-card{
  background:linear-gradient(135deg,var(--navy) 0%,#0f2952 100%);
  border-radius:var(--r-lg);padding:22px;margin-bottom:16px;
  box-shadow:var(--shadow-md);position:relative;overflow:hidden
}
.sat-card::before{
  content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(37,99,235,.25),transparent 70%);
  border-radius:50%
}
.sat-title{font-family:var(--font-head);font-size:16px;color:#fff;font-weight:700;margin-bottom:4px}
.sat-sub{font-size:11px;color:#94A3B8;margin-bottom:18px}
.sat-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.sat-metric{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r-md);padding:14px;backdrop-filter:blur(4px)
}
.sat-metric-lbl{font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.sat-metric-val{font-size:24px;font-weight:700;font-family:var(--font-mono);color:#fff}
.sat-metric-sub{font-size:10px;color:#64748B;margin-top:3px}
.sat-score-big{
  font-size:56px;font-weight:700;font-family:var(--font-mono);line-height:1;
  background:linear-gradient(135deg,#60A5FA,#34D399);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent
}

/* ═══ PROGRESS BAR ═══════════════════════════════════ */
.prog-wrap{margin-bottom:8px}
.prog-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.prog-lbl{font-size:11px;font-weight:600;color:var(--navy)}
.prog-val{font-size:11px;font-weight:700;font-family:var(--font-mono)}
.prog-bar{height:6px;background:#F1F5F9;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ═══ RISK ROW ═══════════════════════════════════════ */
.risk-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:8px;border:1px solid}
.risk-label{font-size:12px;color:var(--slate);font-weight:500}
.risk-val{font-weight:700;font-size:13px;font-family:var(--font-mono)}

/* ═══ DETAIL ════════════════════════════════════════ */
.back-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;color:var(--slate);font-weight:600;margin-right:16px;font-family:var(--font-sans);transition:all .2s}
.back-btn:hover{border-color:var(--blue);color:var(--blue);background:#EFF6FF}
.detail-header{display:flex;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.detail-header h2{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--navy);letter-spacing:-.02em;margin:0}
.health-badge{border-radius:20px;padding:6px 14px;font-weight:700;font-size:12px;border:1.5px solid;margin-left:auto}

/* ═══ SPINNER ═══════════════════════════════════════ */
.spinner-wrap{display:flex;align-items:center;justify-content:center;min-height:70vh;flex-direction:column;gap:20px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.spinner-text{font-size:13px;color:var(--slate);font-weight:500}
.loading-detail{text-align:center;margin-top:8px}
.loading-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);margin:0 3px;animation:pulse 1.2s ease infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}

/* ═══ DEBUG ══════════════════════════════════════════ */
.debug-box{background:#1E293B;border-radius:10px;padding:14px;margin-top:12px;font-family:var(--font-mono);font-size:11px;color:#94A3B8;max-height:180px;overflow-y:auto;white-space:pre-wrap}
.debug-box .key{color:#38BDF8}.debug-box .val{color:#4ADE80}

/* ═══ QUARTERLY ══════════════════════════════════════ */
.quarter-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.qcard{background:var(--surface);border-radius:var(--r-md);padding:16px;border:1px solid var(--border);text-align:center;box-shadow:var(--shadow)}
.qcard-q{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.06em}
.qcard-val{font-size:24px;font-weight:700;font-family:var(--font-mono);color:var(--navy);margin:6px 0}
.qcard-lbl{font-size:10px;color:var(--slate)}

/* ═══ SUBNAV ════════════════════════════════════════ */
.subnav{display:flex;gap:4px;margin-bottom:16px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border);width:fit-content;box-shadow:var(--shadow)}
.subnav-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--slate);font-family:var(--font-sans);transition:all .2s}
.subnav-btn.active{background:var(--navy);color:#fff;box-shadow:0 2px 6px rgba(13,31,60,.2)}
.subnav-btn:not(.active):hover{background:#F1F5F9;color:var(--navy)}

/* ═══ LAST 30 ════════════════════════════════════════ */
.l30-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.l30-card{border-radius:var(--r-md);padding:14px;border-left:3px solid}
.l30-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.l30-val{font-size:28px;font-weight:700;font-family:var(--font-mono);line-height:1}
.l30-sub{font-size:10px;margin-top:4px}

/* ═══ MYSQL ══════════════════════════════════════════ */
.mysql-result{margin-top:14px;overflow-x:auto}
.mysql-result table{font-size:11px}
.section-title{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border)}

/* ═══ MINI TREND ════════════════════════════════════ */
.mini-trend{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px}
.mini-trend.pos{background:#FEF2F2;color:var(--red)}
.mini-trend.neg{background:#ECFDF5;color:var(--green)}
.mini-trend.flat{background:#F1F5F9;color:var(--slate)}

/* ═══ CONTROL METRICS ════════════════════════════════ */
.ctrl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.ctrl-card{background:var(--surface);border-radius:var(--r-md);padding:16px;border:1px solid var(--border);box-shadow:var(--shadow)}
.ctrl-label{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.ctrl-val{font-size:22px;font-weight:700;font-family:var(--font-mono);color:var(--navy)}
.ctrl-sub{font-size:11px;color:var(--slate);margin-top:3px}
.ctrl-bar-wrap{margin-top:8px}
.ctrl-bar{height:5px;background:#F1F5F9;border-radius:4px;overflow:hidden}
.ctrl-bar-fill{height:100%;border-radius:4px}

/* ═══ CACHE BANNER ═══════════════════════════════════ */
.cache-banner{background:linear-gradient(135deg,#EFF6FF,#F0F9FF);border:1.5px solid #BAE6FD;border-radius:var(--r-md);padding:14px 16px;margin-bottom:14px}
.cache-banner-hd{font-size:13px;font-weight:700;color:#0369A1;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.cache-banner-sub{font-size:11px;color:#64748B;margin-bottom:10px;line-height:1.5}
.cache-banner-actions{display:flex;gap:8px}

<body>
<div id="app"></div>
<script>
const API = window.location.origin + "/api";
const C = {navy:"#0D1F3C",blue:"#2563EB",teal:"#0891B2",green:"#059669",greenL:"#10B981",amber:"#D97706",amberL:"#F59E0B",red:"#DC2626",redL:"#EF4444",purple:"#7C3AED",slate:"#6B7280"};
const TC = ["#2563EB","#059669","#D97706","#7C3AED","#DC2626","#0891B2","#9D4EDD","#F97316","#065F46","#BE185D"];
const PRIO_COLORS = {
  Critical:"#DC2626",Highest:"#DC2626",High:"#D97706",
  Medium:"#2563EB",Low:"#9CA3AF",Lowest:"#CBD5E1",
  "Crítico":"#DC2626","Crítica":"#DC2626","Urgente":"#B91C1C",
  "Alto":"#D97706","Alta":"#D97706",
  "Medio":"#2563EB","Media":"#2563EB",
  "Bajo":"#9CA3AF","Baja":"#9CA3AF",
  "Planificado":"#7C3AED","Planificada":"#7C3AED",
  "Sin prioridad":"#E2E8F0"
};

let state = {
  screen:"login", loginTab:"jira",
  creds:null, clients:[], selected:null,
  filter:"all", meta:null, error:"", charts:{},
  detailTab:"overview",
  mysql:{host:"",port:3306,user:"",password:"",database:"",connected:false,results:null},
  debugInfo:null, warning:""
};
let loginVerified = false;

function formatDate(iso){
  try{
    const d = new Date(iso);
    if(isNaN(d.getTime())) return iso||"";
    return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"}) +
      " " + d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
  }catch(e){ return iso||""; }
}

// ═══ HELPERS ════════════════════════════════════════════
function healthOf(s){
  if(s>=70) return {color:C.green,bg:"#ECFDF5",label:"Sano",cls:"green"};
  if(s>=50) return {color:C.amber,bg:"#FFFBEB",label:"En riesgo",cls:"amber"};
  return {color:C.red,bg:"#FEF2F2",label:"Crítico",cls:"red"};
}

function satOf(s){
  if(s>=75) return {color:C.green,label:"Excelente"};
  if(s>=60) return {color:C.greenL,label:"Bueno"};
  if(s>=45) return {color:C.amber,label:"Regular"};
  return {color:C.red,label:"Bajo"};
}

function computeSatisfaction(c){
  const slaScore       = c.sla_pct || 0;
  const firstRespScore = c.first_response_pct || 0;
  const reopenPenalty  = Math.min(100, (c.reopen_rate||0) * 8);
  const reopenScore    = Math.max(0, 100 - reopenPenalty);
  const agingPenalty   = Math.min(100, (c.aging_7||0) * 6);
  const agingScore     = Math.max(0, 100 - agingPenalty);

  const satisfactionScore = Math.round(
    slaScore * 0.35 +
    firstRespScore * 0.25 +
    reopenScore * 0.25 +
    agingScore * 0.15
  );

  const total = c.total || 1;
  const escalationRate   = Math.round((c.critical_total||0) / total * 100);
  const fcrRate          = Math.max(0, Math.round(100 - (c.reopen_rate||0)));
  const resVelocity      = Math.round(((c.last30_resolved||0) / 4.3) * 10) / 10;
  const backlogPct       = Math.round((c.open||0) / total * 100);
  const qualityScore     = c.bug_rate > 0
    ? Math.max(0, Math.round(100 - c.bug_rate * 1.5))
    : 100;
  const critSlaScore     = c.critical_sla_pct || 0;

  return { satisfactionScore, escalationRate, fcrRate, resVelocity, backlogPct, qualityScore, critSlaScore };
}

function filteredClients(){
  if(state.filter==="all")      return state.clients;
  if(state.filter==="critical") return state.clients.filter(c=>c.health<50);
  if(state.filter==="risk")     return state.clients.filter(c=>c.health>=50&&c.health<70);
  return state.clients.filter(c=>c.health>=70);
}

function destroyCharts(){
  Object.values(state.charts).forEach(ch=>{try{ch.destroy()}catch(e){}});
  state.charts={};
}

// ═══ CHART.JS DEFAULTS ══════════════════════════════════
Chart.defaults.font.family = "'Figtree', sans-serif";
Chart.defaults.font.size = 11;
Chart.defaults.color = "#6B7280";
Chart.defaults.plugins.legend.labels.usePointStyle = true;
Chart.defaults.plugins.legend.labels.padding = 12;
Chart.defaults.plugins.legend.labels.boxWidth = 8;

// ═══ RENDER ══════════════════════════════════════════════
function render(){
  destroyCharts();
  const app = document.getElementById("app");
  if     (state.screen==="login")     renderLogin(app);
  else if(state.screen==="loading")   renderLoading(app);
  else if(state.screen==="dashboard") renderDashboard(app);
  else if(state.screen==="detail")    renderDetail(app);
  else if(state.screen==="error")     renderError(app);
}

// ═══ LOGIN ════════════════════════════════════════════════

      <h1>CSM Dashboard</h1>
      <p>Customer Success · JIRA Cloud + MySQL</p>

      </div>

      </div>

      <div id="jira-config" class="${loginVerified?'':'hidden'}">

        <input id="debug-projects" type="text" placeholder="SV" value="${saved.projects||''}"/>

function switchTab(tab){
  state.loginTab=tab;
  document.querySelectorAll(".tab").forEach((t,i)=>{
    const tabs=["jira","mysql","debug"];
    t.classList.toggle("active",tabs[i]===tab);
  });
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
}

async function testConnection(){
  const url=v("jira-url"),email=v("jira-email"),token=v("jira-token");
  const el=document.getElementById("conn-status");
  el.innerHTML='<div class="alert alert-warn">Conectando…</div>';
  try{
    const r=await post("/test-connection",{url,email,token});
    if(r.ok){
      el.innerHTML=`<div class="alert alert-ok">Conectado como <b>${r.displayName}</b> (${r.email})</div>`;
      loginVerified=true;
      document.getElementById("jira-config").classList.remove("hidden");
      checkCache();
    } else {
      el.innerHTML=`<div class="alert alert-err">${r.error}</div>`;
    }
  }catch(e){
    el.innerHTML=`<div class="alert alert-err">${e.message}</div>`;
  }
}

async function checkCache(){
  try{
    const r = await fetch(API+"/cache/info");
    const info = await r.json();
    const el1 = document.getElementById("cache-banner-top");
    const el2 = document.getElementById("cache-banner");
    const el  = el2 || el1;
    if(!el) return;
    if(!info.available){ if(el) el.innerHTML=""; return; }
    const at = formatDate(info.generated_at);
    const proj = (info.projects||[]).join(", ")||"—";
    const cf = info.clients_filter ? ` · Clientes: ${info.clients_filter}` : "";
    const html = `
      <div class="cache-banner">
        <div class="cache-banner-hd">💾 Cache disponible</div>
        <div class="cache-banner-sub">${at} · ${info.total_issues} tickets · ${info.clients_count} clientes · ${proj} · ${info.days}d${cf}</div>
        <div class="cache-banner-actions">
          <button class="btn btn-blue" style="flex:1;padding:8px;width:auto" onclick="loadFromCache()">⚡ Usar datos en cache</button>
          <button class="btn-outline" style="flex:1;padding:8px" onclick="clearAndReload()">🔄 Borrar cache</button>
        </div>
      </div>`;
    if(el1) el1.innerHTML=html;
    if(el2) el2.innerHTML=html;
  }catch(e){}
}

async function loadFromCache(){
  state.screen="loading"; render();
  try{
    const r = await fetch(API+"/cache/load");
    const d = await r.json();
    if(!d.ok) throw new Error(d.error||"Error");
    if(d.params){
      const saved = JSON.parse(localStorage.getItem("csm_creds")||"{}");
      state.creds = {...saved, ...d.params};
    }
    state.clients = d.clients||[];
    state.meta    = {total:d.total_issues, at:d.generated_at};
    state.warning = (d.warning||"") + " [Datos desde cache]";
    state.screen  = "dashboard"; state.filter = "all";
  }catch(e){ state.error=e.message; state.screen="error"; }
  render();
}

async function clearAndReload(){
  await fetch(API+"/cache/clear",{method:"POST"});
  const el1 = document.getElementById("cache-banner-top");
  const el2 = document.getElementById("cache-banner");
  if(el1) el1.innerHTML="";
  if(el2) el2.innerHTML="";
}

async function testMySQL(){
  const cfg={host:v("my-host"),port:parseInt(v("my-port")),user:v("my-user"),password:v("my-pwd"),database:v("my-db")};
  const el=document.getElementById("my-status");
  el.innerHTML='<div class="alert alert-warn">Conectando…</div>';
  try{
    const r=await post("/mysql/test",cfg);
    if(r.ok){
      Object.assign(state.mysql,cfg,{connected:true});
      el.innerHTML='<div class="alert alert-ok">MySQL conectado correctamente</div>';
    } else {
      el.innerHTML=`<div class="alert alert-err">${r.error}</div>`;
    }
  }catch(e){
    el.innerHTML=`<div class="alert alert-err">${e.message}</div>`;
  }
}

async function runDebug(){
  const url=v("jira-url")||JSON.parse(localStorage.getItem("csm_creds")||"{}").url||"";
  const email=v("jira-email")||JSON.parse(localStorage.getItem("csm_creds")||"{}").email||"";
  const token=v("jira-token")||JSON.parse(localStorage.getItem("csm_creds")||"{}").token||"";
  const projects=v("debug-projects").split(",").map(s=>s.trim()).filter(Boolean);
  const el=document.getElementById("debug-result");
  el.innerHTML='<div class="alert alert-warn" style="margin-top:10px">Analizando…</div>';
  try{
    const r=await post("/debug-sample",{url,email,token,projects});
    if(r.total_in_project===0){
      el.innerHTML=`<div class="alert alert-err" style="margin-top:10px">⚠️ No hay issues. Verifica la clave del proyecto.</div>`;
      return;
    }
    let html=`<div class="debug-box" style="margin-top:10px">`;
    html+=`<span class="key">Total en proyecto: </span><span class="val">${r.total_in_project}</span>\n`;
    html+=`<span class="key">Issue muestra:     </span><span class="val">${r.sample_key}</span>\n`;
    html+=`<span class="key">Estado:            </span><span class="val">${r.sample_status}</span>\n\n`;
    if(r.sla_candidates&&Object.keys(r.sla_candidates).length){
      html+=`<span class="key">── Campos SLA ──</span>\n`;
      Object.keys(r.sla_candidates).forEach(k=>{html+=`<span class="val">  ${k}</span>\n`;});
    }
    if(r.org_candidates&&Object.keys(r.org_candidates).length){
      html+=`\n<span class="key">── Campos cliente ──</span>\n`;
      Object.keys(r.org_candidates).forEach(k=>{html+=`<span class="val">  ${k}</span>\n`;});
    }
    html+=`</div>`;
    el.innerHTML=html;
  }catch(e){
    el.innerHTML=`<div class="alert alert-err" style="margin-top:10px">✗ ${e.message}</div>`;
  }
}

function v(id){const el=document.getElementById(id);return el?el.value.trim():"";}
async function post(ep,body){const r=await fetch(API+ep,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});return r.json();}

async function loadMetrics(){
  const url=v("jira-url"),email=v("jira-email"),token=v("jira-token");
  const projects=v("jira-projects").split(",").map(s=>s.trim()).filter(Boolean);
  const clients=v("jira-clients")||"";
  const slaField="customfield_11324";
  const days=parseInt(v("jira-days"))||90;
  const cfg={url,email,token,projects,clients,slaField,days};
  localStorage.setItem("csm_creds",JSON.stringify(cfg));
  state.creds=cfg; state.screen="loading"; render();
  try{
    const d=await post("/metrics",cfg);
    if(!d.ok) throw new Error(d.error||"Error desconocido");
    state.clients=d.clients||[];
    state.meta={total:d.total_issues,at:d.generated_at};
    state.warning=d.warning||"";
    state.screen="dashboard"; state.filter="all";
  }catch(e){state.error=e.message;state.screen="error";}
  render();
}

// ═══ TOPBAR ═══════════════════════════════════════════════
function topbarHtml(){
  const totalOpen  = state.clients.reduce((a,c)=>a+c.open,0);
  const avgSla     = state.clients.length ? Math.round(state.clients.reduce((a,c)=>a+c.sla_pct,0)/state.clients.length) : 0;
  const critClients= state.clients.filter(c=>c.health<50).length;
  const critTickets= state.clients.reduce((a,c)=>a+(c.critical_total||0),0);
  const metaStr    = state.meta ? ` · ${state.meta.total} tickets · ${formatDate(state.meta.at)}` : "";

  // Compute global satisfaction avg
  const avgSat = state.clients.length
    ? Math.round(state.clients.reduce((a,c)=>a+computeSatisfaction(c).satisfactionScore,0)/state.clients.length)
    : 0;

  return `<div class="topbar">
    <div class="topbar-brand"><h1>📊 CSM Dashboard</h1><p>JIRA Cloud${metaStr}</p></div>
    <div class="topbar-stats">
      <div class="tstat"><div class="tstat-val" style="color:#60A5FA">${state.clients.length}</div><div class="tstat-lbl">Clientes</div></div>
      <div class="topbar-divider"></div>
      <div class="tstat"><div class="tstat-val" style="color:${totalOpen>20?C.amberL:C.greenL}">${totalOpen}</div><div class="tstat-lbl">Abiertos</div></div>
      <div class="tstat" title="Promedio SLA global"><div class="tstat-val" style="color:${avgSla>=80?C.greenL:C.redL}">${avgSla}%</div><div class="tstat-lbl">SLA global</div></div>
      <div class="tstat" title="Score de satisfacción promedio estimado"><div class="tstat-val" style="color:${avgSat>=70?C.greenL:avgSat>=50?C.amberL:C.redL}">${avgSat}</div><div class="tstat-lbl">Satisfacción</div></div>
      <div class="tstat" title="Tickets prioridad Crítica"><div class="tstat-val" style="color:${critTickets>0?C.redL:C.greenL}">${critTickets}</div><div class="tstat-lbl">Críticos</div></div>
      <div class="tstat" title="Clientes con Health < 50"><div class="tstat-val" style="color:${critClients>0?C.redL:C.greenL}">${critClients}</div><div class="tstat-lbl">En riesgo</div></div>
      <div class="topbar-divider"></div>
      <div class="topbar-actions">
        <button class="btn-sm" style="color:#94A3B8;border-color:#94A3B8" onclick="exportExcel()">⬇ Excel</button>
        <button class="btn-sm" style="color:#94A3B8;border-color:#94A3B8" onclick="exportPDF()">⬇ PDF</button>
        <button class="btn-sm" style="color:#60A5FA;border-color:#60A5FA" onclick="loadMetrics2()">↺ Refrescar</button>
        <button class="btn-sm" style="color:#94A3B8;border-color:#94A3B8" onclick="logout()">Salir</button>
      </div>
    </div>
  </div>`;
}

// ═══ DASHBOARD ════════════════════════════════════════════
function renderDashboard(app){
  const clients = filteredClients();

  const rows = clients.map(c=>{
    const h = healthOf(c.health);
    const sat = computeSatisfaction(c);
    const satInfo = satOf(sat.satisfactionScore);
    const vs = c.total_vs_prev_pct;
    const vsHtml = vs!=null
      ? `<span class="mini-trend ${vs>0?'pos':vs<0?'neg':'flat'}">${vs>0?'↑':'↓'} ${Math.abs(vs)}%</span>`
      : `<span class="mini-trend flat">—</span>`;
    return `<tr class="data-row" onclick="selectClient('${c.name.replace(/'/g,"\\'")}')">
      <td style="font-weight:600;font-size:13px">${c.name}</td>
      <td><div class="hbar-wrap">
        <div class="hbar"><div class="hbar-fill" style="width:${c.health}%;background:${h.color}"></div></div>
        <span style="font-weight:700;color:${h.color};font-family:var(--font-mono);font-size:12px">${c.health}</span>
        <span class="hbadge" style="background:${h.bg};color:${h.color}">${h.label}</span>
      </div></td>
      <td style="font-weight:700;color:${sat.satisfactionScore>=70?C.green:sat.satisfactionScore>=50?C.amber:C.red};font-family:var(--font-mono)">${sat.satisfactionScore}</td>
      <td style="font-weight:700;color:${c.sla_pct>=80?C.green:C.red};font-family:var(--font-mono)">${c.sla_pct}%</td>
      <td style="font-family:var(--font-mono)">${c.mttr}h</td>
      <td style="font-weight:700;color:${c.open>8?C.red:C.navy}">${c.open}</td>
      <td style="font-weight:700;color:${c.aging_7>2?C.red:C.green}">${c.aging_7}</td>
      <td style="font-weight:700;color:${c.aging_14>0?C.red:C.green}">${c.aging_14}</td>
      <td style="font-weight:700;color:${c.bug_rate>35?C.red:C.teal}">${c.bug_rate}%</td>
      <td style="color:var(--slate)">${c.total} ${vsHtml}</td>
    </tr>`;
  }).join("");

      satScores.map(s=>s>=70?C.green+"CC":s>=50?C.amber+"CC":C.red+"CC"),

// ═══ CHART HELPERS ════════════════════════════════════════
function mkBar(id,labels,data,label,colors,extra={}){
  const el=document.getElementById(id); if(!el) return;
  state.charts[id]=new Chart(el,{type:"bar",data:{labels,datasets:[{label,data,backgroundColor:colors,borderRadius:6,borderSkipped:false}]},
    options:{plugins:{legend:{display:false}},scales:{y:{grid:{color:"#F1F5F9"},border:{display:false}},x:{grid:{display:false},border:{display:false}}},...extra}});
}
function mkLine(id,labels,datasets){
  const el=document.getElementById(id); if(!el) return;
  state.charts[id]=new Chart(el,{type:"line",data:{labels,datasets:datasets.map(d=>({...d,backgroundColor:d.bg,fill:true,tension:.4,pointRadius:3,pointHoverRadius:5}))},
    options:{plugins:{legend:{position:"bottom"}},scales:{y:{grid:{color:"#F1F5F9"},border:{display:false}},x:{grid:{display:false},border:{display:false}}}}});
}
function mkDoughnut(id,labels,data,colors,showLegend=false){
  const el=document.getElementById(id); if(!el) return;
  const bgColors=colors||TC.slice(0,data.length);
  state.charts[id]=new Chart(el,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:bgColors,borderWidth:2,borderColor:"#fff",hoverOffset:4}]},
    options:{plugins:{legend:{display:showLegend,position:"bottom"}},cutout:"58%"}});
}

// ═══ ACTIONS ═════════════════════════════════════════════
function selectClient(name){
  state.selected=state.clients.find(c=>c.name===name);
  if(state.selected){state.screen="detail";state.detailTab="overview";render();}
}
function goBack(){state.screen="dashboard";state.selected=null;render();}
function logout(){state.screen="login";state.clients=[];loginVerified=false;render();}
async function loadMetrics2(){
  state.screen="loading";render();
  try{
    const d=await post("/metrics",state.creds);
    if(!d.ok) throw new Error(d.error||"Error");
    state.clients=d.clients||[];
    state.meta={total:d.total_issues,at:d.generated_at};
    state.warning=d.warning||"";
    state.screen="dashboard";state.filter="all";
  }catch(e){state.error=e.message;state.screen="error";}
  render();
}

// ═══ EXPORTS ══════════════════════════════════════════════
async function exportExcel(){
  try{
    const r=await fetch(API+"/export/excel",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({clients:state.clients})});
    if(!r.ok){const e=await r.json();alert("Error: "+e.error);return;}
    const blob=await r.blob();
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`csm_${new Date().toISOString().slice(0,10)}.xlsx`;a.click();
  }catch(e){alert("Error al exportar: "+e.message);}
}
async function exportPDF(){
  try{
    const r=await fetch(API+"/export/pdf",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({clients:state.clients})});
    if(!r.ok){const e=await r.json();alert("Error: "+e.error);return;}

    a.download=`csm_${new Date().toISOString().slice(0,10)}.pdf`;a.click();

// ═══ PPT WITH CHARTS ══════════════════════════════════════
function exportPPT(){
  const c = state.selected;
  if(!c){ alert("Abrí el detalle de un cliente primero."); return; }
  try{
    const pptx = new PptxGenJS();
    pptx.layout = "LAYOUT_WIDE";
    const sat = computeSatisfaction(c);
    const healthColor = c.health>=70?"10B981":c.health>=50?"F59E0B":"EF4444";
    const satColor    = sat.satisfactionScore>=70?"10B981":sat.satisfactionScore>=50?"F59E0B":"EF4444";
    const slaColor    = c.sla_pct>=80?"059669":"DC2626";

    // ── Configuración de tema ──────────────────────────
    const NAVY   = "0D1F3C";
    const NAVY2  = "1A3461";
    const WHITE  = "FFFFFF";
    const SLATE  = "64748B";
    const BORDER = "E2E8F0";
    const BG     = "F8FAFC";

    // ── SLIDE 1: Portada ───────────────────────────────
    const s1 = pptx.addSlide();
    s1.background = {color: NAVY};
    // Acento visual
    s1.addShape(pptx.ShapeType.rect, {x:0,y:0,w:.4,h:5.63,fill:{color:"2563EB"}});
    s1.addShape(pptx.ShapeType.rect, {x:0,y:0,w:13.33,h:.08,fill:{color:"2563EB"}});
    s1.addText("CUSTOMER SUCCESS REPORT",
      {x:.8,y:.6,w:11,h:.5,fontSize:11,bold:true,color:"2563EB",fontFace:"Arial",charSpacing:3});
    s1.addText(c.name,
      {x:.8,y:1.2,w:11,h:1.6,fontSize:42,bold:true,color:WHITE,fontFace:"Arial",valign:"top"});
    s1.addShape(pptx.ShapeType.rect, {x:.8,y:2.85,w:2,h:.05,fill:{color:"2563EB"}});
    s1.addText(`Health Score`,
      {x:.8,y:3.05,w:3,h:.35,fontSize:11,color:"94A3B8",fontFace:"Arial",charSpacing:1});
    s1.addText(`${c.health}/100`,
      {x:.8,y:3.45,w:3,h:.7,fontSize:32,bold:true,color:healthColor,fontFace:"Arial"});
    s1.addText(`Satisfacción`,
      {x:3.8,y:3.05,w:3,h:.35,fontSize:11,color:"94A3B8",fontFace:"Arial",charSpacing:1});
    s1.addText(`${sat.satisfactionScore}/100`,
      {x:3.8,y:3.45,w:3,h:.7,fontSize:32,bold:true,color:satColor,fontFace:"Arial"});
    s1.addText(`SLA · ${c.sla_pct}%  ·  MTTR · ${c.mttr}h  ·  Total · ${c.total} tickets`,
      {x:.8,y:4.6,w:11,h:.4,fontSize:13,color:"94A3B8",fontFace:"Arial"});
    s1.addText(new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"long",year:"numeric"}),
      {x:.8,y:5.1,w:5,h:.35,fontSize:11,color:"475569",fontFace:"Arial"});

    // ── SLIDE 2: KPIs + Gráfico SLA Donut ──────────────
    const s2 = pptx.addSlide();
    s2.background = {color: "F8FAFC"};
    s2.addShape(pptx.ShapeType.rect, {x:0,y:0,w:13.33,h:.55,fill:{color:NAVY}});
    s2.addText("KPIs Principales",
      {x:.3,y:.1,w:12,h:.35,fontSize:17,bold:true,color:WHITE,fontFace:"Arial"});

    const kpiData = [
      ["Health Score",      `${c.health}/100`,      healthColor],
      ["Satisfacción Est.", `${sat.satisfactionScore}/100`,satColor],
      ["SLA Tiempo Abs.",   `${c.sla_pct}%`,         slaColor],
      ["MTTR promedio",     `${c.mttr}h`,             "2563EB"],
      ["P50 resolución",    `${c.res_p50||0}h`,       "2563EB"],
      ["P90 resolución",    `${c.res_p90||0}h`,       "D97706"],
      ["1ª Respuesta SLA",  `${c.first_response_pct||0}%`, (c.first_response_pct||0)>=80?"059669":"D97706"],
      ["FCR (Proxy)",       `${sat.fcrRate}%`,        sat.fcrRate>=85?"059669":sat.fcrRate>=70?"D97706":"DC2626"],
      ["Total tickets",     `${c.total}`,             NAVY],
      ["Abiertos",          `${c.open}`,              c.open>8?"DC2626":NAVY],
      [">7 días abiertos",  `${c.aging_7}`,           c.aging_7>2?"DC2626":"059669"],
      ["Escalación",        `${sat.escalationRate}%`, sat.escalationRate>20?"DC2626":sat.escalationRate>10?"D97706":"059669"],
      ["vs período ant.",   c.total_vs_prev_pct!=null?`${c.total_vs_prev_pct>0?"+":""}${c.total_vs_prev_pct}%`:"—",
        c.total_vs_prev_pct>0?"DC2626":c.total_vs_prev_pct<0?"059669":"64748B"],
      ["Críticos (30d)",    `${c.last30_critical||0}`, (c.last30_critical||0)>5?"DC2626":"D97706"],
      ["Resueltos (30d)",   `${c.last30_resolved||0}`, "059669"],
    ];

    // 3 columnas × 4 filas (left side), donut SLA a la derecha sin overlap
    kpiData.slice(0,12).forEach(([lbl,val,col],i)=>{
      const col_x = i%3;
      const row_y = Math.floor(i/3);
      const bx = .3 + col_x*2.9;
      const by = .7 + row_y*1.22;

      {x:1,y:2.7,w:11.33,h:.8,fontSize:28,bold:true,color:WHITE,fontFace:"Arial",align:"center"});
    s9.addText("Customer Success Intelligence",
      {x:1,y:3.5,w:11.33,h:.5,fontSize:14,color:"94A3B8",fontFace:"Arial",align:"center"});
    s9.addText(`Reporte generado: ${new Date().toLocaleDateString("es-AR")} · Período: ${state.creds?.days||90} días`,
      {x:1,y:4.5,w:11.33,h:.35,fontSize:10,color:"475569",fontFace:"Arial",align:"center"});

    const fname = `${c.name.replace(/[^a-zA-Z0-9]/g,"_")}_CSM_${new Date().toISOString().slice(0,10)}.pptx`;
    pptx.writeFile({fileName: fname});
  }catch(e){
    console.error(e);
    alert("Error al generar PPT: "+e.message+"\n"+e.stack);
  }
}

render();
</script>
